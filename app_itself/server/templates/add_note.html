<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>Мои заметки</h1>
    <a href="/add">Добавить новую заметку</a>
    <ul>
        {% for note in notes %}
        <li>
            <h3>{{ note['title'] }}</h3>
            <p>{{ note['content'] }}</p>
            <a href="/edit/{{ note['id'] }}">Редактировать</a> |
            <a href="/delete/{{ note['id'] }}" onclick="return confirm('Вы уверены?')">Удалить</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
