services:
  app-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: fastapi-app-test
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb-test:27017/notesdb
    depends_on:
      - mongodb-test
    networks:
      - app-network
    volumes:
      - ./frontend/templates:/frontend/templates

  mongodb-test:
    image: mongo:latest
    container_name: mongo-db-test
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
